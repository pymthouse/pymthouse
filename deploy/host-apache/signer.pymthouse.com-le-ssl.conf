# TLS front for public signer-dmz (pymthouse.com OIDC/JWKS; host port 8091).
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName signer.pymthouse.com
    ServerAdmin webmaster@pymthouse.com

    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:8091/
    ProxyPassReverse / http://127.0.0.1:8091/
    RequestHeader set X-Forwarded-Proto "https"

    SSLCertificateFile /etc/letsencrypt/live/signer.pymthouse.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/signer.pymthouse.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
