# Local signer: full signer-dmz (Apache + mod_authnz_jwt + go-livepeer in one
# image), same as production (railway.json / render.yaml). Exposes the DMZ on
# 127.0.0.1:8080 by default (see SIGNER_DMZ_HOST_PORT). The app should use
# SIGNER_INTERNAL_URL=http://127.0.0.1:8080
# SIGNER_CLI_URL=http://127.0.0.1:8082 (livepeer-cli paths at /) or http://127.0.0.1:8080/__signer_cli
#
# Build the image first (go-livepeer from ../go-livepeer via lpclearinghouse):
#   ./scripts/build-local-signer.sh
# Then start:
#   docker compose up -d signer-dmz
#
# Optional OpenMeter stack (usage metering + trial credits):
#   docker compose -f docker-compose.openmeter.yml up -d
#   npm run openmeter:bootstrap
#
# Production (Railway, separate project from signer):
#   See docs/openmeter-railway.md and docker-compose.openmeter.railway.yml

services:
  signer-dmz:
    image: pymthouse/signer-dmz:local
    build:
      context: .
      dockerfile: docker/signer-dmz/Dockerfile
      target: signer-dmz-local
    # Host SIGNER_DMZ_HOST_PORT → container PORT (Apache edge; default 8080 in environment below).
    ports:
      - target: 8080
        published: ${SIGNER_DMZ_HOST_PORT:-8080}
        host_ip: ${SIGNER_DMZ_BIND_HOST:-127.0.0.1}
      - target: 8082
        published: ${SIGNER_CLI_HOST_PORT:-8082}
        host_ip: ${SIGNER_DMZ_BIND_HOST:-127.0.0.1}
    volumes:
      - ${SIGNER_DATA_DIR:-./data}:/data
    environment:
      - PORT=8080
      - CLI_PORT=8082
      - SIGNER_PORT=8081
      - SIGNER_READY_TIMEOUT_SECONDS=${SIGNER_READY_TIMEOUT_SECONDS:-300}
      - SIGNER_NETWORK=${SIGNER_NETWORK:-arbitrum-one-mainnet}
      - ETH_RPC_URL=${ETH_RPC_URL:-https://arb1.arbitrum.io/rpc}
      - SIGNER_ETH_ADDR=${SIGNER_ETH_ADDR:-}
      - SIGNER_REMOTE_DISCOVERY=${SIGNER_REMOTE_DISCOVERY:-0}
      - ORCH_WEBHOOK_URL=${ORCH_WEBHOOK_URL:-}
      - LIVE_AI_CAP_REPORT_INTERVAL=${LIVE_AI_CAP_REPORT_INTERVAL:-}
      # Same NEXTAUTH_URL as the Next app so signer-dmz entrypoint sets AuthJWTIss
      # to match getIssuer(). Leave OIDC_* / JWKS_URI unset to derive in entrypoint.
      # If the Next app sets OIDC_ISSUER (e.g. http://127.0.0.1:3001/api/v1/oidc), set
      # the same values here; localhost vs 127.0.0.1 mismatch → Apache 401 HTML on /sign-*.
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3001}
      - OIDC_ISSUER=${OIDC_ISSUER:-}
      - OIDC_AUDIENCE=${OIDC_AUDIENCE:-}
      - JWKS_URI=${JWKS_URI:-}
      # Set to 1 when JWKS is HTTPS with a self-signed / corporate CA (local dev).
      - JWKS_TLS_INSECURE=${JWKS_TLS_INSECURE:-}
      - REMOTE_SIGNER_WEBHOOK_URL=${REMOTE_SIGNER_WEBHOOK_URL:-http://host.docker.internal:3001/webhooks/remote-signer}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
