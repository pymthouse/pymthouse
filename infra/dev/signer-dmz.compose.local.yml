# Local-only Apache JWT DMZ in front of go-livepeer: two services (gateway + signer).
# This compose file is for clone-and-run development and is allowed to build
# images inline from the repo. It must not be used as a production deployment input.
#
# From repo root:
#   docker compose -f infra/dev/signer-dmz.compose.local.yml up --build
#
# Gateway listens on localhost:8080 → Apache on port 80 inside the gateway container.
# Signer is not published; only the gateway can reach it on the internal network.

services:
  signer:
    build:
      context: ../..
      dockerfile: infra/docker/signer-dmz/Dockerfile.signer
    expose:
      - "8081"
    volumes:
      - signer_dmz_data:/data
    environment:
      SIGNER_NETWORK: ${SIGNER_NETWORK:-arbitrum-one-mainnet}
      SIGNER_PORT: "8081"
      ETH_RPC_URL: ${ETH_RPC_URL:-https://arb1.arbitrum.io/rpc}
      SIGNER_ETH_ADDR: ${SIGNER_ETH_ADDR:-}
      SIGNER_REMOTE_DISCOVERY: ${SIGNER_REMOTE_DISCOVERY:-0}
      ORCH_WEBHOOK_URL: ${ORCH_WEBHOOK_URL:-}
      LIVE_AI_CAP_REPORT_INTERVAL: ${LIVE_AI_CAP_REPORT_INTERVAL:-}

  gateway:
    build:
      context: ../..
      dockerfile: infra/docker/signer-dmz/Dockerfile
      target: gateway
    ports:
      - "127.0.0.1:8080:80"
    environment:
      PORT: "80"
      SIGNER_UPSTREAM: http://signer:8081
      SIGNER_CLI_HTTP_ADDR: http://signer:4935
      OIDC_ISSUER: ${OIDC_ISSUER:-https://pymthouse.com/api/v1/oidc}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-https://pymthouse.com/api/v1/oidc}
      JWKS_URI: ${JWKS_URI:-https://pymthouse.com/api/v1/oidc/jwks}
      JWKS_REFRESH_SECONDS: ${JWKS_REFRESH_SECONDS:-900}
      JWKS_TLS_INSECURE: ${JWKS_TLS_INSECURE:-}
    depends_on:
      - signer
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:80/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  signer_dmz_data:
