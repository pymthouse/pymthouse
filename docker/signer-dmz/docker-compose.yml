# Apache JWT DMZ in front of go-livepeer: two services (gateway + signer).
#
# From repo root:
#   docker compose -f docker/signer-dmz/docker-compose.yml up --build
# From this directory:
#   docker compose up --build
#
# Gateway host publish defaults to 127.0.0.1:8080 → Apache :80 in the container.
# Set SIGNER_DMZ_BIND_HOST=0.0.0.0 (and SIGNER_DMZ_HOST_PORT if needed) for
# external access from the server. Signer is not published; only the gateway
# reaches it on the internal network.

services:
  signer:
    build:
      context: ../..
      dockerfile: docker/signer-dmz/Dockerfile.signer
    expose:
      - "8081"
    volumes:
      - signer_dmz_data:/data
    environment:
      SIGNER_NETWORK: ${SIGNER_NETWORK:-arbitrum-one-mainnet}
      SIGNER_PORT: "8081"
      ETH_RPC_URL: ${ETH_RPC_URL:-https://arb1.arbitrum.io/rpc}
      SIGNER_ETH_ADDR: ${SIGNER_ETH_ADDR:-}
      SIGNER_REMOTE_DISCOVERY: ${SIGNER_REMOTE_DISCOVERY:-1}
      ORCH_WEBHOOK_URL: ${ORCH_WEBHOOK_URL:-}
      LIVE_AI_CAP_REPORT_INTERVAL: ${LIVE_AI_CAP_REPORT_INTERVAL:-}
      BYOC_PER_CAP_PRICING: ${BYOC_PER_CAP_PRICING:-0}

  gateway:
    build:
      context: ../..
      dockerfile: docker/signer-dmz/Dockerfile
      target: gateway
    ports:
      - target: 80
        published: ${SIGNER_DMZ_HOST_PORT:-8080}
        host_ip: ${SIGNER_DMZ_BIND_HOST:-127.0.0.1}
    environment:
      PORT: "80"
      SIGNER_DMZ_ENABLE_CLI_LISTENER: "0"
      SIGNER_UPSTREAM: http://signer:8081
      SIGNER_CLI_HTTP_ADDR: http://signer:4935
      OIDC_ISSUER: ${OIDC_ISSUER:-https://pymthouse.com/api/v1/oidc}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-https://pymthouse.com/api/v1/oidc}
      JWKS_URI: ${JWKS_URI:-https://pymthouse.com/api/v1/oidc/jwks}
      JWKS_REFRESH_SECONDS: ${JWKS_REFRESH_SECONDS:-900}
      JWKS_TLS_INSECURE: ${JWKS_TLS_INSECURE:-}
    depends_on:
      - signer
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:80/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  signer_dmz_data:
