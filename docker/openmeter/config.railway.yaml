# Railway private networking — use *.railway.internal (not Docker Compose DNS).
# Service names must match Railway service names in the preview environment.

ingest:
  kafka:
    broker: openmeter-kafka.railway.internal:9092
    brokerAddressFamily: v4
    socketKeepAliveEnable: true
    topicMetadataRefreshInterval: 10s

aggregation:
  clickhouse:
    address: openmeter-clickhouse.railway.internal:9000

sink:
  minCommitCount: 1
  namespaceRefetch: 1s
  namespaceRefetchTimeout: 1s
  kafka:
    brokers: openmeter-kafka.railway.internal:9092
    brokerAddressFamily: v4
    socketKeepAliveEnable: true
    topicMetadataRefreshInterval: 10s
  dedupe:
    enabled: true
    driver: redis
    config:
      address: ${OPENMETER_REDIS_ADDRESS}
      database: 0
      expiration: 768h # 32d

postgres:
  url: postgres://postgres:${OPENMETER_POSTGRES_PASSWORD}@openmeter-postgres.railway.internal:5432/postgres?sslmode=disable
  autoMigrate: migration

telemetry:
  log:
    level: info

meters:
  - slug: network_fee_usd_nanos
    description: Livepeer signed-ticket network fee (USD nanos; 1 USD = 1e9)
    eventType: create_signed_ticket
    aggregation: SUM
    valueProperty: $.network_fee_usd_nanos
    groupBy:
      client_id: $.client_id
      external_user_id: $.external_user_id
      pipeline: $.pipeline
      model_id: $.model_id

  - slug: signed_ticket_count
    description: Signed ticket count per user
    eventType: create_signed_ticket
    aggregation: COUNT
    groupBy:
      client_id: $.client_id
      external_user_id: $.external_user_id
      pipeline: $.pipeline
      model_id: $.model_id
