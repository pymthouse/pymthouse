name: Deploy staging (Vercel)

# Manually deploys any branch to staging.pymthouse.com by force-pushing it onto the
# literal `staging` branch. Vercel's native Git integration then builds and
# auto-aliases staging.pymthouse.com from that push — the domain is bound to the
# `staging` branch under Preview in Project Settings -> Domains, and the Ignored
# Build Step only allows builds when VERCEL_GIT_COMMIT_REF is `staging` (everything
# else, including main, stays CI-controlled).
#
# Enable with repository variable:
#   VERCEL_PREVIEW_AUTO_DEPLOY=true

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy to staging"
        required: true
        type: string

concurrency:
  group: deploy-staging-vercel
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    if: vars.VERCEL_PREVIEW_AUTO_DEPLOY == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout requested branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Push to staging branch
        run: git push origin "HEAD:refs/heads/staging" --force
