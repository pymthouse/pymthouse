name: Deploy preview (Vercel)

# Non-main branches deploy Preview builds to the pymthouse Vercel project.
# The same project deploys Production from main via deploy-production-vercel.yml.
# Non-sensitive Preview vars come from `vercel pull`. Sensitive vars (NEXTAUTH_SECRET,
# AUTH_TOKEN_PEPPER) are not exported by Vercel for local/CI builds — inject them from
# the GitHub environment `vercel / preview` secrets (runtime still uses Vercel Preview).
# Requires VERCEL_TOKEN and VERCEL_PREVIEW_AUTO_DEPLOY=true.

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-preview-vercel-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    if: vars.VERCEL_PREVIEW_AUTO_DEPLOY == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: vercel / preview
      url: ${{ vars.VERCEL_PREVIEW_URL || 'https://staging.pymthouse.com' }}
    env:
      VERCEL_ORG_ID: team_JoeNhmK7pgiuSeOwgQASAUFl
      VERCEL_PROJECT_ID: prj_oldvnmdXcGDc7Db5ohPCOUGBZOaG
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      AUTH_TOKEN_PEPPER: ${{ secrets.AUTH_TOKEN_PEPPER }}
      # Branch-scoped Preview vars are not always present in `vercel pull` during CI
      # prebuild — inject the canonical staging URL so validate:env passes.
      NEXTAUTH_URL: ${{ vars.VERCEL_PREVIEW_URL || 'https://staging.pymthouse.com' }}
      STAGING_DOMAIN: ${{ vars.VERCEL_PREVIEW_ALIAS_DOMAIN || 'staging.pymthouse.com' }}
      STAGING_ALIAS_BRANCH: ${{ vars.VERCEL_PREVIEW_ALIAS_BRANCH || 'feat/openmeter-hosted' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Deploy pymthouse preview
        id: vercel_deploy
        run: |
          set -euo pipefail
          vercel link --project pymthouse --yes --token="$VERCEL_TOKEN"
          deployment_url=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "Deployment URL: $deployment_url"
          if [[ "${GITHUB_REF_NAME}" == "${STAGING_ALIAS_BRANCH}" ]]; then
            echo "Staging domain (auto-assigned when gitBranch matches): https://${STAGING_DOMAIN}"
          else
            echo "Skipping staging domain note: branch ${GITHUB_REF_NAME} != ${STAGING_ALIAS_BRANCH}"
          fi
