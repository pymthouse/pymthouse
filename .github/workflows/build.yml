name: SonarQube Cloud analysis

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Cloud
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pymthouse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pymthouse_test"
          --health-interval 4s
          --health-timeout 5s
          --health-retries 15

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/pymthouse_test
      AUTH_TOKEN_PEPPER: ci-test-auth-token-pepper-value-please-change
      NEXTAUTH_SECRET: ci-test-nextauth-secret-please-change

    steps:
      - name: Checkout pymthouse
        uses: actions/checkout@v4
        with:
          # Shallow clones should be disabled for a better relevancy of analysis
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Apply database migrations
        run: npm run db:prepare

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703 # v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
