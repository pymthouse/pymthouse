name: Deploy Railway preview clearinghouse stack

# Invoked by deploy-staging.yml (push to staging or manual) or workflow_dispatch below.
# Production deploys on v* tag via deploy-railway-production.yml.
#
# Enable with repository variable:
#   RAILWAY_PREVIEW_AUTO_DEPLOY=true
#
# Preview env vars: configure in Railway dashboard or run locally:
#   RAILWAY_ENVIRONMENT=preview bash scripts/railway-apply-stack-env.sh
#
# Required secret: RAILWAY_API_TOKEN (same account token as production deploy)
# Optional secrets for apply step (when RAILWAY_PREVIEW_APPLY_ENV=true):
#   OPENMETER_URL, OPENMETER_API_KEY, WEBHOOK_SECRET

on:
  workflow_dispatch:
    inputs:
      apply_env:
        description: Apply stack env from GitHub secrets before deploy
        type: boolean
        default: false
  workflow_call:
    inputs:
      ref:
        description: Git ref (branch) to deploy
        type: string
        required: false
      apply_env:
        description: Apply stack env from GitHub secrets before deploy
        type: boolean
        required: false
        default: false
    secrets:
      RAILWAY_API_TOKEN:
        required: false
      OPENMETER_URL:
        required: false
      OPENMETER_API_KEY:
        required: false
      WEBHOOK_SECRET:
        required: false

concurrency:
  group: deploy-railway-preview
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    if: vars.RAILWAY_PREVIEW_AUTO_DEPLOY == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: railway / preview
      url: ${{ vars.RAILWAY_PREVIEW_SIGNER_URL || 'https://pymthouse-preview.up.railway.app' }}
    env:
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      RAILWAY_ENVIRONMENT: preview
      RAILWAY_PROJECT_ID: dab233aa-dd5f-429d-8cc4-9042e8735e2b
      OPENMETER_URL: ${{ secrets.OPENMETER_URL }}
      OPENMETER_API_KEY: ${{ secrets.OPENMETER_API_KEY }}
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
      NEXTAUTH_URL: ${{ vars.RAILWAY_PREVIEW_NEXTAUTH_URL || 'https://staging.pymthouse.com' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Apply preview environment variables
        if: inputs.apply_env == true || vars.RAILWAY_PREVIEW_APPLY_ENV == 'true'
        run: bash scripts/railway-apply-stack-env.sh

      - name: Deploy clearinghouse stack
        run: bash scripts/railway-deploy-stack.sh preview
