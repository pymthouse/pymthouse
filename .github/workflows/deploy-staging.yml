name: Deploy staging

# Auto-deploys on push to the `staging` branch, or manually deploys a chosen branch.
# Staging is a paired unit:
# the Railway preview clearinghouse stack (kafka + OpenMeter collector + signer DMZ)
# and the Vercel staging app (staging.pymthouse.com) are dependent services deployed
# together from the same branch. Railway goes first, then Vercel (the frontend
# depends on the backend services being up).
#
# Vercel: an ordinary Preview deployment is created and staging.pymthouse.com is
# re-aliased onto it (`vercel alias set`). Git-triggered preview builds also pick
# up the domain when staging.pymthouse.com is assigned to the staging Git branch
# (run scripts/assign-staging-domain-branch.sh once, or use the Domains UI).
# pymthouse.com must be a verified team domain under ecs-vercel (TXT verification,
# no nameserver migration) — otherwise alias/branch assignment returns "no access".
#
# Enable with repository variables:
#   RAILWAY_PREVIEW_AUTO_DEPLOY=true   (Railway half)
#   VERCEL_PREVIEW_AUTO_DEPLOY=true    (Vercel half)

on:
  push:
    branches:
      - staging
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy to staging"
        required: true
        type: string

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-railway:
    permissions:
      contents: read
      deployments: write
    uses: ./.github/workflows/deploy-railway-preview.yml
    with:
      ref: ${{ inputs.branch || github.ref_name }}
    secrets:
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      OPENMETER_URL: ${{ secrets.OPENMETER_URL }}
      OPENMETER_API_KEY: ${{ secrets.OPENMETER_API_KEY }}
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}

  deploy-vercel:
    needs: deploy-railway
    if: >
      always() &&
      vars.VERCEL_PREVIEW_AUTO_DEPLOY == 'true' &&
      (needs.deploy-railway.result == 'success' || needs.deploy-railway.result == 'skipped')
    permissions:
      contents: read
      deployments: write
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: vercel / preview
      url: https://staging.pymthouse.com
    env:
      VERCEL_ORG_ID: team_JoeNhmK7pgiuSeOwgQASAUFl
      VERCEL_PROJECT_ID: prj_oldvnmdXcGDc7Db5ohPCOUGBZOaG
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      AUTH_TOKEN_PEPPER: ${{ secrets.AUTH_TOKEN_PEPPER }}
      # Branch-scoped Preview vars are not always present in `vercel pull` during CI
      # prebuild — inject the canonical staging URL so validate:env passes.
      NEXTAUTH_URL: https://staging.pymthouse.com

    steps:
      - name: Checkout requested branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref_name }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Deploy and alias staging
        run: |
          set -euo pipefail
          url=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          vercel alias set "$url" staging.pymthouse.com --token="$VERCEL_TOKEN"
          echo "Deployment URL: $url"
          echo "Staging alias: https://staging.pymthouse.com"
