name: Deploy production (Vercel)

# Deploys the pymthouse Vercel project (pymthouse.com) on v* tag push or via release workflow.
# Non-sensitive Production vars come from `vercel pull`. Sensitive vars are injected
# from GitHub environment `vercel / production` secrets for CI `vercel build`.
#
# Enable with repository variable:
#   VERCEL_PRODUCTION_AUTO_DEPLOY=true
#
# Required secret:
#   VERCEL_TOKEN
#
# Recommended: disable native Git auto-builds on the pymthouse Vercel project
# (Settings → Git → Ignored Build Step: exit 1) so only this workflow deploys prod.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        type: string
        required: false

concurrency:
  group: deploy-production-vercel
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    if: vars.VERCEL_PRODUCTION_AUTO_DEPLOY == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: vercel / production
      url: ${{ vars.VERCEL_PRODUCTION_URL || 'https://pymthouse.com' }}
    env:
      VERCEL_ORG_ID: team_JoeNhmK7pgiuSeOwgQASAUFl
      VERCEL_PROJECT_ID: prj_oldvnmdXcGDc7Db5ohPCOUGBZOaG
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      AUTH_TOKEN_PEPPER: ${{ secrets.AUTH_TOKEN_PEPPER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to pymthouse production
        id: vercel_deploy
        run: |
          deployment_url=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "Vercel alias: $deployment_url"
          echo "Canonical URL: ${{ vars.VERCEL_PRODUCTION_URL || 'https://pymthouse.com' }}"
