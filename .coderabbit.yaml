# =============================================================================
# CodeRabbit AI PR Review Configuration
# =============================================================================
# Reviews run only when triggered manually in a PR comment:
#   @coderabbitai review  |  @coderabbitai full review
# Docs: https://docs.coderabbit.ai/getting-started/configure-coderabbit
# =============================================================================

language: en-US

reviews:
  auto_review:
    enabled: false
    drafts: false
    base_branches:
      - main

  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"

  request_changes_workflow: false

  collapse_finished_reviews: true

  path_filters:
    - "!package-lock.json"
    - "!**/*.lock"
    - "!**/dist/**"
    - "!**/.next/**"
    - "!**/coverage/**"

  poem: false

  tools:
    github-checks:
      enabled: true
    eslint:
      enabled: true
    biome:
      enabled: false

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: auto
