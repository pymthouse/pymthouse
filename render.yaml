# Render Blueprint for go-livepeer signer service
# This file can be used to deploy the signer to Render
# See: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: pymthouse-signer
    env: docker
    dockerfilePath: ./docker/signer-dmz/Dockerfile
    plan: starter # Change to 'free' for free tier (will spin down after 15min inactivity)
    # Apache serves /healthz; /status is also proxied without JWT for livepeer compatibility
    healthCheckPath: /healthz
    envVars:
      # Render injects PORT for the web service; Apache (signer-dmz) must listen on PORT.
      # SIGNER_PORT is go-livepeer loopback only — do not point the public URL at 8081.
      - key: SIGNER_NETWORK
        value: arbitrum-one-mainnet
      - key: SIGNER_PORT
        value: "8081"
      - key: ETH_RPC_URL
        value: https://arb1.arbitrum.io/rpc
      - key: SIGNER_ETH_ADDR
        sync: false # Set this in Render dashboard (optional)
      - key: SIGNER_REMOTE_DISCOVERY
        value: 1
    disk:
      name: livepeer-data
      mountPath: /data
      sizeGB: 1
