sonar.projectKey=pymthouse_pymthouse
sonar.organization=pymthouse

sonar.sourceEncoding=UTF-8

# Application sources (exclude generated / build artifacts).
sonar.sources=src,docker,scripts,.github
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/coverage/**,\
  **/dist/**,\
  **/test-results/**,\
  src/lib/proto-generated.js,\
  src/lib/proto-generated.d.ts

# Tests live under src alongside sources.
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.mjs

sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Coverage scope is intentionally narrower than analysis scope until unit-test
# debt is paid down (see GitHub issues filed with this change). Sonar still
# analyzes these paths for bugs/vulns/smells; they are only omitted from the
# coverage / new_coverage quality-gate metrics.
#
# Keep `src/lib/**` in coverage — that is where most of the existing unit
# suite lives. Expand coverage back into excluded paths as tests land.
#
# MCP streamable-HTTP / McpServer wiring is integration-level (SDK + auth DB);
# pure helpers under src/lib/mcp/{config,capability-allow,session}.ts stay covered.
sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.mjs,\
  **/scripts/**,\
  **/*.config.*,\
  **/proto-generated.*,\
  src/test-utils/**,\
  src/components/**,\
  src/context/**,\
  src/app/**,\
  src/lib/mcp/auth.ts,\
  src/lib/mcp/handle-http.ts,\
  src/lib/mcp/hosted-server.ts,\
  src/lib/mcp/session.ts,\
  docker/**,\
  .github/**
