# OpenMeter Collector: go-livepeer remote signer Kafka -> OpenMeter CloudEvents ingest.
# Topology: one Kafka topic per signer; collector is the sole OpenMeter ingest path (async).
# Billing identity: go-livepeer emits auth_id only (see go-livepeer/server/remote_signer.go).
# Parse auth_id with the same rules as pymthouse openMeterDimensionsFromAuthId / customer-key.ts:
#   compound "client_id:external_user_id" -> subject + groupBy dimensions (OpenMeter org layout)
#   opaque string -> subject = auth_id; client_id and external_user_id both = auth_id
# Requires OpenMeter's Redpanda Connect distribution with the openmeter output plugin.

input:
  kafka:
    addresses:
      - ${KAFKA_BROKERS}
    topics:
      - ${KAFKA_GATEWAY_TOPIC}
    consumer_group: openmeter-collector
    start_from_oldest: true

pipeline:
  processors:
    - mapping: |
        root = if this.type != "create_signed_ticket" { deleted() }

    - mapping: |
        let data = this.data.or({})

        # go-livepeer only emits auth_id for billing identity (no client_id / usage_subject)
        let auth_id = $data.auth_id.or("").string().trim()
        root = if $auth_id == "" { deleted() }

        # Match openMeterDimensionsFromAuthId / parseOpenMeterCustomerKey (first colon splits)
        let colon = $auth_id.index_of(":")
        let is_compound = $colon > 0 && $colon < $auth_id.length() - 1
        let client_id = if $is_compound { $auth_id.slice(0, $colon) } else { $auth_id }
        let external_user_id = if $is_compound { $auth_id.slice($colon + 1) } else { $auth_id }

        let eth_usd = env("ETH_USD_PRICE").number().or(3500)

        # computed_fee is Wei as decimal string from go-livepeer
        let fee_wei = $data.computed_fee.number().or(0)
        let fee_usd_micros = ($fee_wei * $eth_usd / 1000000000000).round()

        root = {
          "specversion": "1.0",
          "type": "create_signed_ticket",
          "id": $data.request_id.or(uuid_v4()),
          "source": "go-livepeer-remote-signer",
          "subject": $auth_id,
          "time": $data.current_time.or(now()),
          "data": {
            "client_id": $client_id,
            "external_user_id": $external_user_id,
            "network_fee_usd_micros": $fee_usd_micros,
            "pipeline": if $data.pipeline != "" && $data.pipeline != null { $data.pipeline } else { "unknown" },
            "model_id": "unknown",
            "pixels": $data.pixels.string().or("0"),
            "fee_wei": $data.computed_fee.or("0"),
            "gateway_request_id": $data.request_id,
            "auth_id": $auth_id,
          }
        }

    - catch:
        - log:
            level: ERROR
            message: "signed_ticket mapping failed: ${! error() }"
        - mapping: root = deleted()

output:
  openmeter:
    url: ${OPENMETER_URL}
    token: ${OPENMETER_API_KEY}
